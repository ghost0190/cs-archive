<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程备份 - CS Archive</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --blur-amount: 40px;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(102, 126, 234, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(118, 75, 162, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 122, 255, 0.2) 0%, transparent 60%),
                #000;
        }
        
        .bg-gradient::before,
        .bg-gradient::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s ease-in-out infinite;
        }
        
        .bg-gradient::before {
            width: 600px;
            height: 600px;
            background: rgba(102, 126, 234, 0.3);
            top: 10%;
            left: 15%;
        }
        
        .bg-gradient::after {
            width: 500px;
            height: 500px;
            background: rgba(118, 75, 162, 0.3);
            bottom: 10%;
            right: 15%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }
        
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--glass-border);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
        }
        
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-links a:hover {
            color: #fff;
            background: var(--glass-bg);
        }
        
        .nav-links a.active {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        
        .page-title {
            font-size: clamp(36px, 6vw, 56px);
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .page-subtitle {
            font-size: clamp(16px, 2.5vw, 20px);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-bottom: 60px;
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            justify-items: center;
        }
        
        .course-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .course-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        
        .course-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-highlight);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                0 0 40px rgba(102, 126, 234, 0.1);
        }
        
        .course-icon {
            font-size: 56px;
            margin-bottom: 24px;
            display: block;
        }
        
        .course-code {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .course-name {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
        }
        
        .course-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .course-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
        }
        
        .tag {
            padding: 6px 14px;
            background: rgba(0, 122, 255, 0.15);
            color: rgba(0, 122, 255, 0.9);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(0, 122, 255, 0.2);
        }
        
        .course-links {
            display: flex;
            gap: 12px;
        }
        
        .course-link {
            flex: 1;
            padding: 14px;
            text-align: center;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .course-link:hover {
            background: #0066d6;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        
        .course-link.secondary {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .course-link.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .page-title { font-size: 36px; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <header>
        <nav>
            <div class="logo">CS Archive</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="courses.html" class="active">课程备份</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="main-content">
        <h1 class="page-title">课程备份</h1>
        <p class="page-subtitle">收录顶尖学府的计算机科学课程资料</p>
        
        <div class="courses-grid">
            <div class="course-card">
                <span class="course-icon">💻</span>
                <div class="course-code">CS61C</div>
                <div class="course-name">Great Ideas in Computer Architecture</div>
                <div class="course-desc">加州大学伯克利分校经典计算机体系结构课程，涵盖数字逻辑、指令集架构、CPU设计等核心概念。</div>
                <div class="course-tags">
                    <span class="tag">计算机体系结构</span>
                    <span class="tag">RISC-V</span>
                    <span class="tag">Spring 2026</span>
                </div>
                <div class="course-links">
                    <a href="cs61c/sp26-zh/index.html" class="course-link">中文版本</a>
                    <a href="cs61c/sp26-en/index.html" class="course-link secondary">英文版本</a>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 CS Archive | 本站仅用于学习目的</p>
    </footer>
</body>
</html>
