<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Archive - 计算机科学课程备份</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-bg-hover: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --blur-amount: 40px;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(102, 126, 234, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(118, 75, 162, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 122, 255, 0.2) 0%, transparent 60%),
                #000;
            filter: blur(0px);
        }
        
        .bg-gradient::before,
        .bg-gradient::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s ease-in-out infinite;
        }
        
        .bg-gradient::before {
            width: 600px;
            height: 600px;
            background: rgba(102, 126, 234, 0.3);
            top: 10%;
            left: 15%;
        }
        
        .bg-gradient::after {
            width: 500px;
            height: 500px;
            background: rgba(118, 75, 162, 0.3);
            bottom: 10%;
            right: 15%;
            animation-delay: -10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }
        
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid var(--glass-border);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
        }
        
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-links a:hover {
            color: #fff;
            background: var(--glass-bg);
        }
        
        .nav-links a.active {
            color: #fff;
            background: var(--accent);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        
        .hero {
            text-align: center;
            margin-bottom: 80px;
        }
        
        .hero h1 {
            font-size: clamp(48px, 8vw, 80px);
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero-subtitle {
            font-size: clamp(18px, 3vw, 24px);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            letter-spacing: -0.3px;
            margin-bottom: 40px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        
        .glass-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-highlight);
            transform: translateY(-4px);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                0 0 40px rgba(255,255,255,0.05);
        }
        
        .description-card {
            margin-bottom: 60px;
            text-align: left;
        }
        
        .description-card p {
            font-size: 18px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .description-card strong {
            color: #fff;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }
        
        .feature-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .feature-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            pointer-events: none;
        }
        
        .feature-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-highlight);
            transform: translateY(-4px) scale(1.02);
        }
        
        .feature-icon {
            font-size: 40px;
            margin-bottom: 16px;
            display: block;
        }
        
        .feature-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .feature-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .section-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            justify-items: center;
        }
        
        .course-card {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .course-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, transparent 50%, rgba(118, 75, 162, 0.2) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        
        .course-card:hover::before {
            opacity: 1;
        }
        
        .course-card:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-highlight);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.4),
                0 0 40px rgba(102, 126, 234, 0.1);
        }
        
        .course-icon {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
        }
        
        .course-code {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .course-name {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 24px;
        }
        
        .course-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        
        .course-link:hover {
            background: #0066d6;
            transform: scale(1.05);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        
        footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero h1 { font-size: 48px; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <nav>

    </main>

    </footer>
</body>
</html>
