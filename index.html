<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Archive - 计算机课程归档</title>
  <meta name="description" content="CS Archive 收录计算机系统、数学基础等课程的中英文归档入口。">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: #f7f8f9;
      --paper: #ffffff;
      --ink: #20262c;
      --muted: #66717b;
      --line: #dfe5e8;
      --brand: #567a8d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
    }
    a { color: inherit; }
    .header {
      border-bottom: 1px solid var(--line);
      background: rgba(247, 248, 249, 0.94);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav {
      width: min(1040px, calc(100% - 40px));
      min-height: 62px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 750;
      text-decoration: none;
    }
    .brand img { width: 30px; height: 30px; border-radius: 6px; }
    .links { display: flex; gap: 6px; }
    .links a {
      padding: 7px 10px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 14px;
      text-decoration: none;
    }
    .links a[aria-current="page"], .links a:hover {
      color: var(--ink);
      background: #eef2f4;
    }
    main {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 58px 0 78px;
    }
    .hero {
      min-height: calc(100vh - 62px);
      display: grid;
      align-items: center;
      padding: 44px 0;
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 750;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: 0;
    }
    .lead {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 14px;
      border: 1px solid var(--brand);
      border-radius: 6px;
      color: var(--brand);
      font-weight: 750;
      text-decoration: none;
    }
    .button.primary {
      background: var(--brand);
      color: #fff;
    }
    .footer {
      border-top: 1px solid var(--line);
      padding: 24px 20px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    @media (max-width: 760px) {
      .nav { flex-wrap: wrap; padding: 12px 0; }
      .links { width: 100%; overflow-x: auto; }
      main { width: min(100% - 28px, 1040px); padding-top: 42px; }
      .hero { min-height: auto; }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav" aria-label="主导航">
      <a class="brand" href="index.html"><img src="favicon.svg" alt=""><span>CS Archive</span></a>
      <div class="links">
        <a href="index.html" aria-current="page">首页</a>
        <a href="courses.html">课程</a>
        <a href="about.html">关于</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div>
        <p class="eyebrow">Course Archive</p>
        <h1>CS Archive</h1>
        <p class="lead">精选经典计算机课程，整理中文与英文版本，保留课程原貌，也让自学路径更清晰。</p>
        <div class="actions">
          <a class="button primary" href="courses.html">浏览课程</a>
          <a class="button" href="about.html">了解归档</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">CS Archive 仅用于课程资料整理与自学导航。</footer>
</body>
</html>
