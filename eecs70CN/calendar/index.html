<h1 class="mb-4">日历</h1>





    <div id="calendar"></div>
<script>
    // 
    var hiddenDays = "0, 6".split(", ").map(function (x) {
        return parseInt(x);
    });
    // 

    // 
    var maxTime = "24:00:00";
    // 

    function dateFormat(d, includeDay) {
        var o = {
            hour: "numeric",
            minute: "2-digit",
            meridiem: "short",
        };
        if (includeDay) {
            o.weekday = "short";
        }
        return FullCalendar.formatDate(d, o);
    }

    function initializeCalendar() {
        var view;
        var storedView = localStorage.getItem("calendarView");
        if (storedView) {
            view = storedView;
        } else if ($(window).width() < 768) {
            view = "timeGridDay";
        } else {
            view = "timeGridWeek";
        }

        var calendarEl = $("#calendar").get(0);

        var calendar = new FullCalendar.Calendar(calendarEl, {
            themeSystem: "bootstrap5",

            headerToolbar: {
                start: "timeGridDay,timeGridWeek,listWeek",
                // center: 'title',
                end: "prev,next",
            },
            height: "auto",

            // 
            hiddenDays: hiddenDays,
            // 

            // 
            validRange: {
                start: "2026-01-19",
                end: "2026-05-16",
            },
            // 

            nowIndicator: true,

            slotMinTime: "08:00:00",
            slotMaxTime: maxTime,
            // allDaySlot: false,
            initialView: view,

            // pull from google calendar

            googleCalendarApiKey: "AIzaSyABaOq81VMDEJFr-oJUgIWamXKxKKdKh5M",
            events: {
                googleCalendarId: "c_6cf51d4e6f44af3b37185b73a9d9d42adefb44d1966a8d99a17ef8226e13a5e4@group.calendar.google.com",
            },

            viewSkeletonRender: function (info) {
                localStorage.setItem("calendarView", info.view.type);
            },

            columnHeaderText: function (date) {
                return (
                    FullCalendar.formatDate(date, {
                        weekday: "short",
                    }) +
                    " " +
                    FullCalendar.formatDate(date, {
                        day: "numeric",
                        month: "numeric",
                    })
                );
            },

            eventClassNames: function ({ event }) {
                let classes = [];
                if (event.title.includes("Lecture")) {
                    classes.push("lecture-event");
                }
                if (event.title.includes("Party")) {
                    classes.push("party-event");
                }
                if (event.title.includes("Discussion")) {
                    classes.push("discussion-event");
                }
                if (
                    event.title.includes("Prof.") ||
                    event.title.includes("Professor") ||
                    event.title.includes("Instructor")
                ) {
                    classes.push("prof-oh-event");
                }
                if (event.title.includes("Review")) {
                    classes.push("review-event");
                }
                if (event.title.includes("Project")) {
                    classes.push("proj-oh-event");
                }
                if (event.title.includes("Policy")) {
                    classes.push("special-event");
                }
                if (
                    event.title.includes("Final") ||
                    event.title.includes("Midterm")
                ) {
                    classes.push("exam-event");
                }
                return classes;
            },

            eventContent: function ({event, timeText}) {
                // return event.extendedProps.location;
            },

            eventOnMount: function ({event, el, view}) {
                let element = $(el);
                let inList = view.type === "listWeek"
            },

            eventDidMount: function ({ event, timeText, el }) {
                let element = $(el);
                let inList = element.is("tr");
                let content;
                if (event.allDay) {
                    content = FullCalendar.formatDate(event.start, {
                        weekday: "short",
                    });
                } else {
                    content =
                        dateFormat(event.start, true) +
                        " - " +
                        dateFormat(event.end, false);
                }
                let location = event.extendedProps.location;
                console.log(location);
                if (location) {
                    let location_info = " @ " + location;
                    element.find(".fc-event-title").html(`<b>${event.title}</b>`)
                    element.find(".fc-event-title-container").append(location);
                    element.find(".fc-list-item-title a").append(location_info);
                    content = content + location_info;
                }
                if (!inList && !event.title.includes("Meeting")) {
                    element.popover({
                        title: event.title,
                        content: content,
                        trigger: "hover",
                        placement: "left",
                        container: "body",
                    });
                }
            },
        });

        calendar.render();
    }

    $(initializeCalendar);
</script>
