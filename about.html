<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于 - CS Archive</title>
  <meta name="description" content="CS Archive 的简要说明。">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: #f7f8f9;
      --paper: #ffffff;
      --ink: #20262c;
      --muted: #66717b;
      --line: #dfe5e8;
      --brand: #567a8d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; color: var(--ink); background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; line-height: 1.65; }
    a { color: inherit; }
    .header { border-bottom: 1px solid var(--line); background: rgba(247, 248, 249, 0.94); position: sticky; top: 0; z-index: 10; }
    .nav { width: min(1040px, calc(100% - 40px)); min-height: 62px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 750; text-decoration: none; }
    .brand img { width: 30px; height: 30px; border-radius: 6px; }
    .links { display: flex; gap: 6px; }
    .links a { padding: 7px 10px; border-radius: 6px; color: var(--muted); font-size: 14px; text-decoration: none; }
    .links a[aria-current="page"], .links a:hover { color: var(--ink); background: #eef2f4; }
    main { width: min(760px, calc(100% - 40px)); margin: 0 auto; padding: 54px 0 78px; }
    .eyebrow { margin: 0 0 10px; color: var(--brand); font-size: 13px; font-weight: 750; letter-spacing: 0.05em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(34px, 6vw, 54px); line-height: 1.08; letter-spacing: 0; }
    .card { margin-top: 28px; padding: 22px; border: 1px solid var(--line); border-radius: 8px; background: var(--paper); }
    .card h2 { margin: 0 0 10px; font-size: 22px; }
    .card p { margin: 0; color: var(--muted); }
    .card p + p { margin-top: 12px; }
    .footer { border-top: 1px solid var(--line); padding: 24px 20px; color: var(--muted); font-size: 14px; text-align: center; }
    @media (max-width: 760px) {
      .nav { flex-wrap: wrap; padding: 12px 0; }
      .links { width: 100%; overflow-x: auto; }
      main { width: min(100% - 28px, 760px); }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav" aria-label="主导航">
      <a class="brand" href="index.html"><img src="favicon.svg" alt=""><span>CS Archive</span></a>
      <div class="links">
        <a href="index.html">首页</a>
        <a href="courses.html">课程</a>
        <a href="about.html" aria-current="page">关于</a>
      </div>
    </nav>
  </header>

  <main>
    <p class="eyebrow">About</p>
    <h1>关于</h1>
    <section class="card">
      <h2>课程归档</h2>
      <p>CS Archive 收录经典计算机课程的中文与英文版本，帮助学习者更方便地查阅课程资料、规划学习路径。</p>
      <p>目前内容以 Berkeley CS 课程为主，后续会继续整理系统、数学、理论与工程实践相关课程。</p>
    </section>
  </main>

  <footer class="footer">CS Archive 仅用于课程资料整理与自学导航。</footer>
</body>
</html>
